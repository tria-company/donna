# Backend da Donna na VPS (HostHatch) — kortix-api + Caddy (TLS automático).
#
# A imagem `kortix-api:latest` é construída a partir da RAIZ do repo (ver README.md):
#   docker build --build-arg SERVICE=apps/api -f apps/api/Dockerfile -t kortix-api:latest .
#
# Depois, nesta pasta:  docker compose up -d

services:
  api:
    image: kortix-api:latest
    restart: unless-stopped
    env_file: .env
    expose:
      - "8008"          # interno; quem expõe pra internet é o Caddy
    # ── local_docker: o backend cria os sandboxes como containers NESTA VPS ──
    # Precisa falar com o Docker do host (socket) e estar no grupo docker (GID 988)
    # pra ter permissão no socket sem rodar como root.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "988"           # GID do grupo docker no host (getent group docker)
    networks:
      kortix:
        aliases:
          - kortix-api  # o sandbox alcança o backend em http://kortix-api:8008

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks:
      - kortix

volumes:
  caddy_data:
  caddy_config:

# Rede compartilhada backend ↔ sandbox. Nome fixo (kortix-net) → reusado em
# SANDBOX_NETWORK no .env, pra o provider local_docker plugar o sandbox aqui.
networks:
  kortix:
    name: kortix-net
